name: Test Telegram Notification

on:
  workflow_dispatch:
  schedule:
    - cron: '38 20 20 4 *'  # 20:38 UTC = חצי שעה מעכשיו

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram message
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=✅ בדיקה מ-Claude בענן — המשימה הצליחה! המחשב היה כבוי 🎉"
